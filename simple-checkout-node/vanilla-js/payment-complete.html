<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoPay Checkout Bridge</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="completion-shell">
      <section class="completion-panel">
        <div class="brand compact">
          <div class="mark">M</div>
          <div>
            <p>MoPay</p>
            <span>Payment returned</span>
          </div>
        </div>
        <output id="completion-status" class="status">Returning to merchant checkout...</output>
        <div id="bridge-state" class="bridge-state">Closing checkout securely...</div>
        <button type="button" id="return-home" hidden>Return to checkout</button>
      </section>
    </main>

    <script type="module">
      import { MoPayCheckout } from "/sdk/index.js";

      const params = new URLSearchParams(window.location.search);
      const status = params.get("status") || "pending";
      const sessionId = params.get("sessionId") || "";
      const bridgeState = document.querySelector("#bridge-state");
      const completionStatus = document.querySelector("#completion-status");
      const returnHome = document.querySelector("#return-home");

      completionStatus.value = sessionId
        ? `Returned ${status} for ${sessionId}`
        : `Returned ${status}`;

      const bridgeMessage = MoPayCheckout.completeRedirect({ closeWindow: true });
      bridgeState.textContent = bridgeMessage.sessionId
        ? `SDK bridge notified for ${bridgeMessage.sessionId}. The original page will verify this transaction.`
        : "SDK bridge notified. The original page will verify this transaction.";

      window.setTimeout(() => {
        if (window.parent !== window || (window.opener && !window.opener.closed)) {
          return;
        }

        completionStatus.value = "Checkout returned outside the dialog.";
        bridgeState.textContent = "Return to the checkout page to verify the transaction from the merchant backend.";
        returnHome.hidden = false;
      }, 1200);

      returnHome.addEventListener("click", () => {
        window.location.href = "/";
      });
    </script>
  </body>
</html>
